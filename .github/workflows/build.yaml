name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
          - windows
          - linux
          - macos
      arch:
        description: 'Architecture'
        required: false
        type: choice
        options:
          - amd64
          - arm64
          - all
        default: 'all'
      env:
        description: 'Build environment'
        required: false
        type: choice
        options:
          - stable
          - beta
          - ''

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build-android:
    runs-on: ubuntu-22.04
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'android')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          rm -rf plugins/flutter_distributor
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Android Signing
        run: |
          KEYSTORE_SECRET="${{ secrets.KEYSTORE }}"
          if [ -n "$KEYSTORE_SECRET" ]; then
            echo "$KEYSTORE_SECRET" | base64 --decode > android/app/keystore.jks
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          else
            echo "No keystore secret, using debug signing"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          set -o pipefail
          export ANDROID_NDK="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-${ANDROID_HOME}/ndk/$(ls -1 ${ANDROID_HOME}/ndk/ 2>/dev/null | sort -V | tail -1)}}"
          echo "ANDROID_NDK=$ANDROID_NDK"
          ENV_FLAG=""
          ARCH_FLAG=""
          if [[ "${{ github.event.inputs.env }}" == "stable" ]]; then
            ENV_FLAG="--env stable"
          elif [[ "${{ github.event.inputs.env }}" == "beta" ]]; then
            ENV_FLAG="--env beta"
          elif [[ "${{ env.IS_STABLE }}" == "true" ]]; then
            ENV_FLAG="--env stable"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.arch }}" != "all" && "${{ github.event.inputs.arch }}" != "" ]]; then
            ARCH_FLAG="--arch ${{ github.event.inputs.arch }}"
          fi
          dart setup.dart android $ARCH_FLAG $ENV_FLAG 2>&1 | tee setup.log

      - name: Upload setup log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log
          path: setup.log

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android-arm64-v8a
          path: ./dist
          overwrite: true

  build-windows-amd64:
    runs-on: Windows-2022
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'windows' && (github.event.inputs.arch == 'amd64' || github.event.inputs.arch == 'all' || github.event.inputs.arch == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          if (Test-Path plugins/flutter_distributor) { Remove-Item -Recurve -Force plugins/flutter_distributor }
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          $env:ENV_FLAG = ""
          if ("${{ github.event.inputs.env }}" -eq "stable") { $env:ENV_FLAG = "--env stable" }
          elseif ("${{ github.event.inputs.env }}" -eq "beta") { $env:ENV_FLAG = "--env beta" }
          elseif ("${{ env.IS_STABLE }}" -eq "true") { $env:ENV_FLAG = "--env stable" }
          dart setup.dart windows --arch amd64 $env:ENV_FLAG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-windows-amd64
          path: ./dist
          overwrite: true

  build-linux-amd64:
    runs-on: ubuntu-22.04
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'linux' && (github.event.inputs.arch == 'amd64' || github.event.inputs.arch == 'all' || github.event.inputs.arch == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          rm -rf plugins/flutter_distributor
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          ENV_FLAG=""
          if [[ "${{ github.event.inputs.env }}" == "stable" ]]; then
            ENV_FLAG="--env stable"
          elif [[ "${{ github.event.inputs.env }}" == "beta" ]]; then
            ENV_FLAG="--env beta"
          elif [[ "${{ env.IS_STABLE }}" == "true" ]]; then
            ENV_FLAG="--env stable"
          fi
          dart setup.dart linux --arch amd64 $ENV_FLAG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-linux-amd64
          path: ./dist
          overwrite: true

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'linux' && (github.event.inputs.arch == 'arm64' || github.event.inputs.arch == 'all' || github.event.inputs.arch == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          rm -rf plugins/flutter_distributor
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          ENV_FLAG=""
          if [[ "${{ github.event.inputs.env }}" == "stable" ]]; then
            ENV_FLAG="--env stable"
          elif [[ "${{ github.event.inputs.env }}" == "beta" ]]; then
            ENV_FLAG="--env beta"
          elif [[ "${{ env.IS_STABLE }}" == "true" ]]; then
            ENV_FLAG="--env stable"
          fi
          dart setup.dart linux --arch arm64 $ENV_FLAG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-linux-arm64
          path: ./dist
          overwrite: true

  build-macos-amd64:
    runs-on: macos-15-intel
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'macos' && (github.event.inputs.arch == 'amd64' || github.event.inputs.arch == 'all' || github.event.inputs.arch == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          rm -rf plugins/flutter_distributor
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          ENV_FLAG=""
          if [[ "${{ github.event.inputs.env }}" == "stable" ]]; then
            ENV_FLAG="--env stable"
          elif [[ "${{ github.event.inputs.env }}" == "beta" ]]; then
            ENV_FLAG="--env beta"
          elif [[ "${{ env.IS_STABLE }}" == "true" ]]; then
            ENV_FLAG="--env stable"
          fi
          dart setup.dart macos --arch amd64 $ENV_FLAG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-macos-amd64
          path: ./dist
          overwrite: true

  build-macos-arm64:
    runs-on: macos-latest
    if: >-
      (github.event_name == 'push') ||
      (github.event.inputs.platform == 'macos' && (github.event.inputs.arch == 'arm64' || github.event.inputs.arch == 'all' || github.event.inputs.arch == ''))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flutter_distributor
        run: |
          rm -rf plugins/flutter_distributor
          git clone https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        run: |
          ENV_FLAG=""
          if [[ "${{ github.event.inputs.env }}" == "stable" ]]; then
            ENV_FLAG="--env stable"
          elif [[ "${{ github.event.inputs.env }}" == "beta" ]]; then
            ENV_FLAG="--env beta"
          elif [[ "${{ env.IS_STABLE }}" == "true" ]]; then
            ENV_FLAG="--env stable"
          fi
          dart setup.dart macos --arch arm64 $ENV_FLAG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-macos-arm64
          path: ./dist
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [ build-android, build-windows-amd64, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64 ]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: ${{ env.IS_STABLE == 'true' }}
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')
          
          tags=($(git tag --merged HEAD --sort=-creatordate))
          
          temp="NEW_CHANGELOG.md" > "$temp"
          
          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break
          
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
          
              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"
          
          mv "$temp" CHANGELOG.md

      - name: Commit
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            echo "Commit pushing"
            git config --local user.email "dmitriy.work@gmail.com"
            git config --local user.name "Loischsiy"
            git commit -m "Update changelog"
            git push
            if [ $? -eq 0 ]; then
              echo "Push succeeded"
            else
              echo "Push failed"
              exit 1
            fi
          fi

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [ build-android, build-windows-amd64, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64 ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          tags=($(git tag --merged HEAD --sort=-creatordate))
          preTag=$(curl -s "https://api.github.com/repos/Loischsiy/MeowClash/releases/latest" | \
          sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
          
          [ -z "$preTag" ] && preTag=""
          
          out="release.md" > "$out"
          
          for i in "${!tags[@]}"; do
            curr="${tags[i]}"
            [[ "$curr" == "$preTag" ]] && break
          
            prev="${tags[i+1]}"
            range="${prev:+$prev..}$curr"
          
            git log --no-merges --pretty=format:"%B" "$range" | \
            awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          done

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md

      - name: Generate sha256
        if: env.IS_STABLE == 'true'
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Release
        if: ${{ env.IS_STABLE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body_path: './release.md'

      - name: Create Fdroid Source Dir
        if: ${{ env.IS_STABLE == 'true' }}
        run: |
          mkdir -p ./tmp
          cp ./dist/*android-arm64-v8a* ./tmp/ || true
          echo "Files copied successfully"

      - name: Push to fdroid repo
        if: ${{ env.IS_STABLE == 'true' }}
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: ./tmp/
          destination-github-username: Loischsiy
          destination-repository-name: MeowClash-fdroid-repo
          user-name: 'github-actions[bot]'
          user-email: 'github-actions[bot]@users.noreply.github.com'
          target-branch: main
          commit-message: Update from ${{ github.ref_name }}
          target-directory: /tmp/
