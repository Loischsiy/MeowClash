          flutter pub get

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          dart setup.dart macos --arch amd64 --env "$APP_ENV" 2>&1 | tee setup.log

      - name: Upload setup log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log-macos-amd64
          path: setup.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-amd64
          path: ./dist
          overwrite: true

  build-macos-arm64:
    needs: prepare
    runs-on: macos-latest
    env:
      APP_ENV: ${{ inputs.app_env }}
      PUBSPEC_VERSION: ${{ needs.prepare.outputs.pubspec_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch app version
        shell: bash
        run: |
          set -euo pipefail
          sed -i.bak -E "s/^version: .*/version: ${PUBSPEC_VERSION}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep '^version:' pubspec.yaml

      - name: Setup flutter_distributor
        shell: bash
        run: |
          set -euo pipefail
          rm -rf plugins/flutter_distributor
          git clone --depth 1 https://github.com/leanflutter/flutter_distributor plugins/flutter_distributor
          rm -rf plugins/flutter_distributor/.git

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter clean
          flutter pub get

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          dart setup.dart macos --arch arm64 --env "$APP_ENV" 2>&1 | tee setup.log

      - name: Upload setup log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log-macos-arm64
          path: setup.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: ./dist
          overwrite: true

  publish-release:
    needs:
      - prepare
      - build-android
      - build-windows-amd64
      - build-linux-amd64
      - build-linux-arm64
      - build-macos-amd64
      - build-macos-arm64
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Release $RELEASE_TAG"
            echo
            echo "Built from $GITHUB_SHA."
            echo
            sed "s|VERSION|$APP_VERSION|g" ./.github/release_template.md
          } > release.md

      - name: Generate sha256
        shell: bash
        run: |
          set -euo pipefail
          cd ./dist
          find . -type f -not -name "*.sha256" -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: MeowClash ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: ./dist/*
          body_path: ./release.md
          prerelease: ${{ inputs.app_env != 'stable' }}
          fail_on_unmatched_files: true
          overwrite_files: true
